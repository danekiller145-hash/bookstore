<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог - Book House</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rambla:wght@400;700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="overlay" id="overlay"></div>

<!-- HEADER -->
<header class="header">
    <div class="logo">
        <img src="images/logo.png" alt="logo">
    </div>
    <div class="header-center">
        <nav class="nav" id="nav">
            <a href="index.html">Главная</a>
            <a href="catalog.html">Каталог</a>
            <a href="#contacts">Контакты</a>
        </nav>
        <div class="search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Найти книгу">
        </div>
    </div>
    <div class="header-right">
        <button class="header-icon">
            <i class="fa-solid fa-book-open-reader"></i>
            <span>Войти</span>
        </button>
        <button class="header-icon cart-btn" id="cartOpen">
            <i class="fa-solid fa-bag-shopping"></i>
            <span>Корзина</span>
            <span id="cartCount">0</span>
        </button>
        <button class="burger" id="burger">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>
</header>

<!-- CART -->
<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h2>Корзина</h2>
        <button id="closeCart">×</button>
    </div>
    <div class="cart-items"></div>
    <div class="cart-footer">
        <button class="checkout-btn" id="checkoutBtn">Перейти к оплате →</button>
        <button class="clear-cart" id="clearCart">Очистить корзину</button>
    </div>
</div>

<!-- CATALOG SECTION -->
<section class="catalog-page">
    <div class="catalog-header">
        <h1>Каталог книг</h1>
        <div class="sorting">
            <label>Сортировать:</label>
            <select id="sortSelect">
                <option value="default">По умолчанию</option>
                <option value="price-asc">Сначала дешевле</option>
                <option value="price-desc">Сначала дороже</option>
                <option value="newest">По новизне</option>
            </select>
        </div>
    </div>

    <div class="catalog-products" id="catalogProducts">
        <!-- Карточки будут подгружаться из JS -->
    </div>
</section>

<!-- NEWSLETTER -->
<section class="newsletter" id="newsletter">
    <h2>Подпишитесь на нашу рассылку</h2>
    <p>Получайте информацию о новых книгах и скидках</p>
    <form>
        <input type="email" placeholder="Введите адрес электронной почты">
        <button>Подписаться</button>
    </form>
</section>

<!-- FOOTER -->
<footer class="footer" id="contacts">
    <div>
        <img src="images/logo.png" class="footer-logo">
    </div>
    <div>
        <h4>Интернет-магазин</h4>
        <p>Акции</p>
        <p>Распродажа</p>
        <p>Доставка</p>
    </div>
    <div>
        <h4>Знаем, что почитать</h4>
        <p>Новинки</p>
        <p>Вопросы и ответы</p>
    </div>
    <div>
        <h4>Контакты</h4>
        <p>info@bookhouse.com</p>
        <div class="social-icons">
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
        </div>
    </div>
</footer>

<script src="data.js"></script>
<script src="catalog.js"></script>
</body>

</html>
